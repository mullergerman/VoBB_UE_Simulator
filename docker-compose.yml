# ---------------------------------------------------------------------------
# Perfiles:
#   local -> app (red bridge) + registrar Kamailio embebido. Test UE-a-UE en
#            este host, sin core IMS. Media interno al contenedor.
#   ims   -> app-ims con network_mode: host, apuntando al P-CSCF real (VM Linux).
#
# Uso:
#   docker compose --profile local up --build      (macOS o Linux, test local)
#   docker compose --profile ims   up --build      (VM Linux, contra IMS real)
# ---------------------------------------------------------------------------
services:
  # ----- Modo local: app en bridge + registrar embebido -----
  app:
    build: .
    image: vobb-ue-sim:latest
    profiles: ["local"]
    depends_on: [registrar]
    restart: unless-stopped             # red de seguridad ante cualquier crash
    environment:
      MODE: local
      LOCAL_REGISTRAR: registrar        # nombre de servicio = P-CSCF simulado
      LOCAL_DOMAIN: vobb.test
      SIP_PORT: "5060"
      RTP_PORT_START: "4000"
      PJSUA_LOG_LEVEL: "4"
      # Relay SIP (opt-in). Para probar que registro/llamadas sobreviven al relay
      # en local: SIP_RELAY=1 docker compose --profile local up -d --build
      SIP_RELAY: "${SIP_RELAY:-0}"
    ports:
      - "8080:8080"                     # interfaz web
    volumes:
      - vobb-data:/srv/data

  registrar:
    build: ./kamailio
    image: vobb-registrar:latest
    profiles: ["local"]
    volumes:
      - ./kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
    expose:
      - "5060/udp"

  # ----- Modo IMS: app con host networking contra P-CSCF real -----
  app-ims:
    build: .
    image: vobb-ue-sim:latest
    profiles: ["ims"]
    network_mode: host                  # SIP/RTP reales hacia el P-CSCF
    restart: unless-stopped             # red de seguridad ante cualquier crash
    environment:
      MODE: ims
      SIP_PORT: "5060"
      RTP_PORT_START: "4000"
      PJSUA_LOG_LEVEL: "4"
      HTTP_PORT: "8080"
      # Relay SIP: necesario para que el SUBSCRIBE reg-event salga del mismo
      # flow :5060 del REGISTER (el P-CSCF lo exige). Activar con:
      #   SIP_RELAY=1 docker compose --profile ims up -d --build
      SIP_RELAY: "${SIP_RELAY:-0}"
    volumes:
      - vobb-data:/srv/data

volumes:
  vobb-data:
