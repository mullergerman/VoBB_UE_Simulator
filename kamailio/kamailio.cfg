#!KAMAILIO
#
# Registrar + proxy SIP mínimo para el MODO LOCAL (test UE-a-UE sin core IMS).
#
# Acepta REGISTER sin desafío Digest (los abonados igual mandan credenciales,
# pero aquí no se validan). El flujo Digest real (401 -> Authorization -> 200)
# se ejercita contra el P-CSCF productivo en modo IMS. Aquí sólo se necesita
# location + ruteo por número para conectar 1001 <-> 1002.

####### Global Parameters #########
debug=2
log_stderror=yes
fork=yes
children=4
auto_aliases=no
listen=udp:0.0.0.0:5060

####### Modules #########
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"

modparam("usrloc", "db_mode", 0)          # location en memoria
modparam("registrar", "method_filtering", 1)
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)

####### Routing Logic #########
request_route {

    # filtro de max-forwards
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # respuestas a OPTIONS de keepalive
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # dialogos ya establecidos: seguir el Record-Route
    if (has_totag()) {
        if (loose_route()) {
            route(RELAY);
            exit;
        }
        if (is_method("ACK")) {
            if (t_check_trans()) { route(RELAY); }
            exit;
        }
        sl_send_reply("404", "Not Found");
        exit;
    }

    # CANCEL
    if (is_method("CANCEL")) {
        if (t_check_trans()) { route(RELAY); }
        exit;
    }

    # registro de ubicaciones (sin auth en modo local)
    if (is_method("REGISTER")) {
        if (!save("location")) {
            sl_reply_error();
        }
        exit;
    }

    # sólo procesamos INVITE/BYE/etc dirigidos a un usuario conocido
    if (is_method("INVITE|BYE|INFO|UPDATE|PRACK|MESSAGE")) {
        record_route();
        if (!lookup("location")) {
            sl_send_reply("404", "User Not Found");
            exit;
        }
        route(RELAY);
        exit;
    }

    sl_send_reply("405", "Method Not Allowed");
}

route[RELAY] {
    if (is_method("INVITE")) {
        t_on_failure("MANAGE_FAILURE");
    }
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) { exit; }
}
